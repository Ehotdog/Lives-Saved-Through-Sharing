<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anonymous Stories</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Anonymous Stories</h1>
    <p class="subtitle">Share your experiences freely</p>

    <div class="post-box">
      <input id="title" placeholder="Title">
      <textarea id="content" placeholder="Write your story..."></textarea>
      <button onclick="postStory()">Post</button>
    </div>

    <div id="posts"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
