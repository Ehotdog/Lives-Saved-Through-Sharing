<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Stories</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Anonymous Stories</h1>

  <div class="container">

    <div id="fyp" class="tab">
      <div id="posts"></div>
    </div>

    <div id="videos" class="tab" style="display:none;">
      <div class="placeholder">🎥 Videos coming soon</div>
    </div>

    <div id="groups" class="tab" style="display:none;">
      <div class="placeholder">👥 Groups coming soon</div>
    </div>

    <div id="create" class="tab" style="display:none;">
      <div class="create-box">
        <input id="title" placeholder="Title">
        <textarea id="content" placeholder="Tell your story..."></textarea>
        <button onclick="postStory()">Post</button>
      </div>
    </div>

  </div>

  <div class="nav">
    <button onclick="showTab('fyp')">🏠 FYP</button>
    <button onclick="showTab('videos')">🎥 Videos</button>
    <button onclick="showTab('groups')">👥 Groups</button>
    <button onclick="showTab('create')">➕ Create</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
