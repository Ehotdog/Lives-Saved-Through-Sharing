<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Stories</title>
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #40E0D0, #00bcd4);
    }
    .container { max-width: 600px; margin: auto; padding: 20px; }
    h1 {
      text-align: center;
      color: white;
      font-size: 46px;
      margin-bottom: 25px;
      font-family: 'Great Vibes', cursive;
      text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px rgba(0,255,255,0.6);
      animation: glow 3s infinite ease-in-out;
    }
    @keyframes glow {
      0% { text-shadow: 0 0 10px rgba(255,255,255,0.6); }
      50% { text-shadow: 0 0 25px rgba(0,255,255,0.8); }
      100% { text-shadow: 0 0 10px rgba(255,255,255,0.6); }
    }
    .create-box {
      background: white; padding: 15px; border-radius: 12px;
      margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, textarea {
      width: 100%; padding: 10px; margin-top: 10px;
      border-radius: 8px; border: 1px solid #ccc;
      font-size: 14px; box-sizing: border-box;
    }
    textarea { resize: none; height: 80px; }
    button {
      margin-top: 10px; padding: 10px 14px; border: none;
      border-radius: 8px; background: #00bcd4; color: white;
      cursor: pointer; font-size: 14px;
    }
    button:hover { background: #0097a7; }
    button:disabled { background: #aaa; cursor: not-allowed; opacity: 0.7; }
    .post {
      background: white; padding: 15px; border-radius: 12px;
      margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .post h3 { margin: 0 0 5px; }
    .post small { color: gray; }
    .comments { margin-top: 10px; }
    .comments p { margin: 5px 0; font-size: 13px; }
    #loading-msg {
      text-align: center; color: white; font-size: 14px;
      margin-bottom: 10px; opacity: 1; transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Anonymous Stories</h1>
    <div id="loading-msg">⏳ Verifying security, please wait...</div>
    <div class="create-box">
      <input id="title" placeholder="Title">
      <textarea id="content" placeholder="Tell your story..."></textarea>
      <button id="post-btn" onclick="postStory()" disabled>Post</button>
    </div>
    <div id="posts"></div>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
